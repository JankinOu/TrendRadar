# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                    Version: 2.0.0
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

# ===============================================================
# 调度系统：使用早晚推送模板（配合你的“固定时间”需求）
# ===============================================================
schedule:
  enabled: true
  preset: "morning_evening"

# ===============================================================
# 平台热榜：彻底关闭（阻断算法推荐和大众社媒噪音）
# ===============================================================
platforms:
  enabled: false
  sources: []

# ===============================================================
# RSS 订阅：你的核心信息源（我已为你预填了几个高质量的商业财经示例）
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2  # 只处理最近2天的新闻，避免长期未读堆积

  feeds:
    # 示例1：36氪-创投与商业快讯 (基于 RSSHub)
    - id: "36kr-news"
      name: "36氪"
      url: "https://rsshub.app/36kr/newsflashes"
      
    # 示例2：晚点 LatePost (深度商业报道)
    - id: "latepost"
      name: "晚点 LatePost"
      url: "https://rsshub.app/latepost"

    # 示例3：华尔街见闻 (宏观与金融)
    - id: "wallstreetcn"
      name: "华尔街见闻"
      url: "https://rsshub.app/wallstreetcn/news/global"
      
    # 你可以在此继续按照格式添加你自己收集的 RSS 链接

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

# ===============================================================
# 推送展示：只保留 RSS 列表和 AI 深度分析结果
# ===============================================================
display:
  region_order:
    - ai_analysis
    - rss
  regions:
    hotlist: false
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true
  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20

# ===============================================================
# 通知渠道：此处保持为空，具体密钥需填在 GitHub Secrets 中
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: false
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

# ===============================================================
# AI 模型配置：适配兼容 OpenAI 协议的便宜/免费平台（如硅基流动）
# ===============================================================
ai:
  # 注意前缀 openai/ 不能删，它强制系统使用 OpenAI 标准协议对接硅基流动等平台
  model: "openai/deepseek-ai/DeepSeek-V3" 
  api_key: "" 
  api_base: "" 
  timeout: 120
  temperature: 0.3 # 降低发散性，让商业总结更严谨客观
  max_tokens: 3000
  num_retries: 2
  fallback_models: []

# ===============================================================
# AI 分析：开启并指向 RSS 数据
# ===============================================================
ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 50 # 限制分析条数，控制成本并聚焦核心
  
  # 【关键修改】开启 RSS 的 AI 分析，否则系统将没有内容可处理
  include_rss: true 
  include_standalone: false
  include_rank_timeline: false # 不需要分析热搜排名轨迹，节省 token

ai_translation:
  enabled: false
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: ""
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
